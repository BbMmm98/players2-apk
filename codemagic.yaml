workflows:
  android:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    scripts:
      - name: Fix permissions
        script: |
          chmod +x gradlew
      - name: Build Android
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
