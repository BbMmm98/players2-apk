workflows:
  android:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    integrations:
      app_store_connect: {}
    environment:
      groups:
        - app_store_credentials
      vars:
        PACKAGE_NAME: "com.players2.app"
    scripts:
      - name: Build Android
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
